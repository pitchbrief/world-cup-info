<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA Ranking — World Cup Info's</title>
<link rel="stylesheet" href="style.css">
<style>
  /* CSS + JS khusus halaman ranking.html — self-contained */

  .ranking-wrap {
    max-width: 720px;
    margin: 0 auto;
  }

  .ranking-search {
    width: 100%;
    padding: 14px 18px;
    border-radius: var(--radius-pill);
    border: 1.5px solid var(--color-border);
    background: var(--color-surface);
    font-size: 14px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-soft);
  }

  .ranking-search:focus {
    outline: none;
    border-color: var(--color-primary);
  }

  .rank-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .rank-item {
    display: grid;
    grid-template-columns: 44px 32px 1fr auto;
    align-items: center;
    gap: 14px;
    background: var(--color-surface);
    border-radius: var(--radius-md);
    padding: 12px 18px;
    box-shadow: var(--shadow-soft);
  }

  .rank-item.top3 {
    background: linear-gradient(90deg, rgba(212,175,55,0.10), rgba(255,255,255,0));
    border: 1px solid rgba(212,175,55,0.35);
  }

  .rank-num {
    font-weight: 900;
    font-size: 18px;
    color: var(--color-primary);
  }

  .rank-item.top3 .rank-num {
    color: var(--color-accent);
  }

  .rank-team-name {
    font-weight: 700;
    font-size: 15px;
  }

  .rank-points {
    font-weight: 700;
    font-size: 13px;
    color: var(--color-text-muted);
  }

  .ranking-updated {
    text-align: center;
    font-size: 12px;
    color: var(--color-text-muted);
    margin-top: 24px;
  }

  .ranking-source-note {
    text-align: center;
    font-size: 11px;
    color: var(--color-text-muted);
    margin-top: 4px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand">
      <span class="brand-icon" id="brand-icon-slot"></span>
      World Cup Info's
    </a>
    <button class="navbar-toggle" id="navbar-toggle-btn">☰</button>
    <div class="navbar-links" id="navbar-links"></div>
  </div>
</nav>

<div class="page-shell">

  <div class="hero" style="padding:36px 0 24px;">
    <div class="hero-badge">📊 FIFA Ranking</div>
    <h1 style="font-size:32px;">Peringkat Dunia FIFA</h1>
    <p>Menampilkan Top 50 tim nasional dengan poin ranking tertinggi.</p>
  </div>

  <div class="ranking-wrap">
    <input type="text" class="ranking-search" id="ranking-search" placeholder="Cari negara...">
    <div class="rank-list" id="rank-list">
      <p style="text-align:center;color:var(--color-text-muted);">Memuat data ranking…</p>
    </div>
    <p class="ranking-updated" id="ranking-updated"></p>
    <p class="ranking-source-note" id="ranking-source"></p>
  </div>

</div>

<footer class="footer">
  <p>World Cup Info's — proyek fan-made, tidak berafiliasi resmi dengan FIFA. Dibuat oleh <a href="https://github.com/pitchbrief" target="_blank" rel="noopener">pitchbrief</a>.</p>
</footer>

<script src="assets/flags-data.js"></script>
<script src="assets/other.js"></script>
<script>
  /* ---- Navbar ---- */
  fetch('config.json').then(function (r) { return r.json(); }).then(function (cfg) {
    document.getElementById('brand-icon-slot').innerHTML = OTHER_SVG.wc2030Logo;
    var linksWrap = document.getElementById('navbar-links');
    var html = '';
    cfg.nav.forEach(function (item) {
      var isActive = item.href === 'ranking.html';
      html += '<a class="navbar-link' + (isActive ? ' active' : '') + '" href="' + item.href + '">' +
        '<span class="nav-icon">' + (OTHER_SVG[item.icon] || '') + '</span>' + item.label + '</a>';
    });
    linksWrap.innerHTML = html;
  });
  document.getElementById('navbar-toggle-btn').addEventListener('click', function () {
    document.getElementById('navbar-links').classList.toggle('open');
  });

  /* ---- Ranking Logic ---- */
  var allRankings = [];

  function renderRankings(list) {
    var wrap = document.getElementById('rank-list');
    if (list.length === 0) {
      wrap.innerHTML = '<p style="text-align:center;color:var(--color-text-muted);">Negara tidak ditemukan.</p>';
      return;
    }
    var html = '';
    list.forEach(function (r) {
      var flagSvg = (typeof FLAGS !== 'undefined' && FLAGS[r.code]) ? FLAGS[r.code] : '';
      html += '<div class="rank-item' + (r.rank <= 3 ? ' top3' : '') + '">' +
        '<div class="rank-num">#' + r.rank + '</div>' +
        '<div class="flag-icon">' + flagSvg + '</div>' +
        '<div class="rank-team-name">' + r.team + '</div>' +
        '<div class="rank-points">' + r.points.toFixed(2) + ' pts</div>' +
        '</div>';
    });
    wrap.innerHTML = html;
  }

  fetch('assets/ranking.json').then(function (r) { return r.json(); }).then(function (data) {
    allRankings = data.rankings;
    renderRankings(allRankings);
    document.getElementById('ranking-updated').textContent = 'Update: ' + data.periodLabel;
    document.getElementById('ranking-source').textContent = data.source;
  }).catch(function () {
    document.getElementById('rank-list').innerHTML = '<p style="text-align:center;color:#E4002B;">Gagal memuat data ranking.</p>';
  });

  document.getElementById('ranking-search').addEventListener('input', function (e) {
    var q = e.target.value.toLowerCase().trim();
    var filtered = allRankings.filter(function (r) {
      return r.team.toLowerCase().indexOf(q) !== -1 || r.code.toLowerCase().indexOf(q) !== -1;
    });
    renderRankings(filtered);
  });
</script>
</body>
</html>
